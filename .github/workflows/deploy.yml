name: Deploy DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 811936460688.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Docker image
        run: docker build -t devops-cicd-app .

      - name: Tag Docker image
        run: docker tag devops-cicd-app:latest 811936460688.dkr.ecr.us-east-1.amazonaws.com/devops-cicd-app:latest

      - name: Push Docker image
        run: docker push 811936460688.dkr.ecr.us-east-1.amazonaws.com/devops-cicd-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: 32.192.254.167
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd devops-cicd-docker-aws
            ./deploy.sh
